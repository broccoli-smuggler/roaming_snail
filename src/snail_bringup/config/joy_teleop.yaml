teleop_node:
  ros__parameters:
    publish_stamped_twist: true
    # Hold enable_button to drive; release acts as brake/deadman.
    require_enable_button: true
    enable_button: 5          # R1 / RB — hold to enable
    enable_turbo_button: -1   # disabled

    # Left stick Y — forward / backward
    axis_linear:
      x: 1
    scale_linear:
      x: 3.0                  # m/s at full deflection (tune to taste)
    scale_linear_turbo:
      x: 3.0

    # Right stick X — steering
    axis_angular:
      yaw: 3
    scale_angular:
      yaw: 1.0                # rad/s at full deflection (tune to taste)
    scale_angular_turbo:
      yaw: 1.0
